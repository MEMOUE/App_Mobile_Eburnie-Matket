name: app_mobile_eburnie_market
description: "Application mobile Éburnie-Market - Petites annonces Côte d'Ivoire"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── HTTP & Networking ──────────────────────────────────────────────────────
  http: ^1.2.1
  dio: ^5.4.3+1

  # ── Storage ───────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ── UI & Design ───────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # ── Forms & Validation ────────────────────────────────────────────────────
  reactive_forms: ^17.0.1

  # ── Image ─────────────────────────────────────────────────────────────────
  image_picker: ^1.1.1
  flutter_image_compress: ^2.3.0

  # ── Authentification ──────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── State Management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Utils ─────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Décommenter après avoir créé ces dossiers :
  # assets:
  #   - assets/images/
  #   - assets/icons/